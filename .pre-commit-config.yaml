default_language_version:
  python: python3.12

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv --no-config run ruff check .
        language: system
        pass_filenames: false

      - id: ruff-format
        name: ruff format check
        entry: uv --no-config run ruff format --check .
        language: system
        pass_filenames: false

      - id: test
        name: test suite
        entry: uv --no-config run pytest
        language: system
        pass_filenames: false
        stages: [pre-push]

      # mypy narrows sys.platform checks, so its verdict differs per platform.
      # Pin both CI platforms explicitly so the local gate matches the CI
      # matrix regardless of the developer's host OS.
      - id: type-check-win32
        name: type check (win32)
        entry: uv --no-config run mypy --platform win32 src tests
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: type-check-linux
        name: type check (linux)
        entry: uv --no-config run mypy --platform linux src tests
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: build-distributions
        name: build distributions
        entry: uv --no-config build
        language: system
        pass_filenames: false
        stages: [pre-push]
